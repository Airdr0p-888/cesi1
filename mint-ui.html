<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FairMint - Mint 页面</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .back-link:hover { text-decoration: underline; }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 26px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .status {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
        }
        .status.info { background: #e3f2fd; color: #1565c0; }
        .status.success { background: #e8f5e9; color: #2e7d32; }
        .status.error { background: #ffebee; color: #c62828; }
        .status.warning { background: #fff3e0; color: #e65100; }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: monospace;
            transition: border-color 0.3s;
        }
        .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
            background: white;
            cursor: pointer;
        }
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .wallet-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .network-badge.testnet { background: #fff3e0; color: #e65100; }
        .network-badge.mainnet { background: #e8f5e9; color: #2e7d32; }
        .network-badge.wrong { background: #ffebee; color: #c62828; }
        .wallet-address {
            font-family: monospace;
            color: #667eea;
            word-break: break-all;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .info-item {
            background: #f8f9fa;
            padding: 14px;
            border-radius: 10px;
        }
        .info-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 17px;
            font-weight: 600;
            color: #333;
        }
        .progress-wrap {
            margin-bottom: 24px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
            border-radius: 4px;
        }
        .progress-text {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: 6px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #555;
        }
        .btn-secondary:hover { background: #e8e8e8; }
        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-outline:hover { background: #667eea; color: white; }
        .wallet-select {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .wallet-select-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .wallet-select-btn:hover { border-color: #667eea; background: #f8f9ff; }
        .wallet-select-btn.active { border-color: #667eea; background: #f0f2ff; color: #667eea; }
        .wallet-detect-info {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #mintInfo { display: none; }
        #setupPanel { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <h1>🚀 Mint 代币</h1>
        <div class="subtitle">连接钱包，参与公平 Mint</div>

        <div id="status" class="status" style="display:none;"></div>

        <!-- 第一步：输入合约地址（无 URL 参数时显示） -->
        <div id="setupPanel">
            <div class="wallet-detect-info" id="walletDetectInfo"></div>
            <div class="wallet-select" id="walletSelectGroup">
                <button class="wallet-select-btn active" id="walletMM" onclick="selectWallet('metamask')">
                    🦊 MetaMask
                </button>
                <button class="wallet-select-btn" id="walletTW" onclick="selectWallet('trustwallet')">
                    🛡️ Trust Wallet
                </button>
            </div>
            <div class="input-group">
                <label>网络</label>
                <select id="networkSelect" onchange="onNetworkChange()">
                    <option value="97" selected>BSC 测试网 (Testnet)</option>
                    <option value="56">BSC 主网 (Mainnet)</option>
                </select>
            </div>
            <div class="input-group">
                <label>合约地址</label>
                <input type="text" id="contractInput" placeholder="0x..." 
                       value="" spellcheck="false" autocomplete="off">
            </div>
            <button class="btn btn-primary" id="connectBtn" onclick="startConnect()">
                连接钱包并加载
            </button>
        </div>

        <!-- 有 URL 参数时直接显示连接按钮（无需手动输入） -->
        <div id="quickConnectPanel" style="display:none;">
            <div class="wallet-detect-info" id="quickWalletDetectInfo"></div>
            <div class="wallet-select" id="quickWalletSelectGroup">
                <button class="wallet-select-btn active" id="quickWalletMM" onclick="selectWallet('metamask')">
                    🦊 MetaMask
                </button>
                <button class="wallet-select-btn" id="quickWalletTW" onclick="selectWallet('trustwallet')">
                    🛡️ Trust Wallet
                </button>
            </div>
            <div class="input-group">
                <label>网络</label>
                <select id="quickNetworkSelect" onchange="onNetworkChange()">
                    <option value="97" selected>BSC 测试网 (Testnet)</option>
                    <option value="56">BSC 主网 (Mainnet)</option>
                </select>
            </div>
            <div style="background:#f0f4ff; border-radius:10px; padding:12px 16px; margin-bottom:16px; font-size:13px; color:#555; word-break:break-all;">
                <span style="color:#888;">合约地址</span><br>
                <span id="contractDisplay" style="font-family:monospace; color:#667eea;"></span>
            </div>
            <button class="btn btn-primary" id="quickConnectBtn" onclick="startConnect()">
                💎 连接钱包参与 Mint
            </button>
        </div>

        <!-- 第二步：Mint 信息面板 -->
        <div id="mintInfo">
            <div class="wallet-info">
                <div>
                    <span style="color:#888;">钱包</span><br>
                    <span id="walletType" style="font-size:12px; color:#667eea;"></span>
                    <span id="walletAddress" class="wallet-address"></span>
                </div>
                <div style="text-align:right;">
                    <span id="networkBadge" class="network-badge"></span><br>
                    <span style="color:#888; font-size:12px;">BNB</span>
                    <span id="bnbBalance" style="font-weight:600;"></span>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Mint 价格</div>
                    <div class="info-value" id="mintPrice">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">每份代币</div>
                    <div class="info-value" id="mintCount">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">已 Mint</div>
                    <div class="info-value" id="mintedSlots">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">总份数</div>
                    <div class="info-value" id="totalSlots">-</div>
                </div>
            </div>

            <div class="progress-wrap">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:0%;"></div>
                </div>
                <div class="progress-text">进度: <span id="progressText">0</span>%</div>
            </div>

            <button class="btn btn-primary" id="mintBtn" onclick="doMint()">
                Mint
            </button>
            <button class="btn btn-secondary" onclick="refreshInfo()">
                🔄 刷新
            </button>
            <button class="btn btn-outline" id="switchNetBtn" onclick="switchNetwork()" style="display:none;">
                🔄 切换到 <span id="switchNetName"></span>
            </button>
        </div>
    </div>

    <script>
        let provider, signer, contract, userAddress;
        let currentChainId = null;
        let selectedWallet = 'metamask'; // 默认选择 MetaMask
        let activeEthereum = null; // 实际使用的 ethereum provider

        // BSC 网络配置
        const BSC_NETWORKS = {
            56: { name: 'BSC 主网', symbol: 'BNB', rpc: 'https://bsc-dataseed.binance.org/', explorer: 'https://bscscan.com', chainName: 'BNB Smart Chain Mainnet' },
            97: { name: 'BSC 测试网', symbol: 'tBNB', rpc: 'https://data-seed-prebsc-1-s1.binance.org:8545/', explorer: 'https://testnet.bscscan.com', chainName: 'BNB Smart Chain Testnet' }
        };

        const ABI = [
            "function mint() payable",
            "function mintActive() view returns (bool)",
            "function mintPrice() view returns (uint256)",
            "function mintCount() view returns (uint256)",
            "function mintedSlots() view returns (uint256)",
            "function totalMintSlots() view returns (uint256)",
            "function hasMinted(address) view returns (bool)",
            "function balanceOf(address) view returns (uint256)",
            "function name() view returns (string)",
            "function symbol() view returns (string)"
        ];

        // ============ 钱包检测与选择 ============
        function detectWallets() {
            const setupInfo = document.getElementById('walletDetectInfo');
            const quickInfo = document.getElementById('quickWalletDetectInfo');
            
            if (typeof window.ethereum === 'undefined') {
                const msg = '⚠️ 未检测到钱包扩展，请安装 MetaMask 或 Trust Wallet';
                if (setupInfo) setupInfo.textContent = msg;
                if (quickInfo) quickInfo.textContent = msg;
                return;
            }

            // 检测是否同时安装了多个钱包
            const hasProviders = window.ethereum.providers && window.ethereum.providers.length > 1;
            const hasMM = window.ethereum.providers 
                ? window.ethereum.providers.some(p => p.isMetaMask)
                : window.ethereum.isMetaMask;
            const hasTW = window.ethereum.providers 
                ? window.ethereum.providers.some(p => p.isTrust || p.isTrustWallet)
                : (window.ethereum.isTrust || window.ethereum.isTrustWallet);

            if (hasProviders) {
                const detected = [];
                if (hasMM) detected.push('🦊 MetaMask');
                if (hasTW) detected.push('🛡️ Trust Wallet');
                const msg = '检测到多个钱包：' + detected.join('、') + '，请选择要使用的钱包';
                if (setupInfo) setupInfo.textContent = msg;
                if (quickInfo) quickInfo.textContent = msg;
                // 显示选择按钮
                document.getElementById('walletSelectGroup').style.display = 'flex';
                document.getElementById('quickWalletSelectGroup').style.display = 'flex';
            } else {
                // 只有一个钱包，隐藏选择按钮
                const walletName = hasMM ? 'MetaMask' : hasTW ? 'Trust Wallet' : '已连接钱包';
                const msg = '✅ 检测到钱包：' + walletName;
                if (setupInfo) setupInfo.textContent = msg;
                if (quickInfo) quickInfo.textContent = msg;
                document.getElementById('walletSelectGroup').style.display = 'none';
                document.getElementById('quickWalletSelectGroup').style.display = 'none';
                // 自动选择检测到的钱包
                if (hasTW) selectedWallet = 'trustwallet';
            }

            // 更新选择按钮高亮
            updateWalletBtns();
        }

        // 选择钱包
        function selectWallet(type) {
            selectedWallet = type;
            updateWalletBtns();
        }

        // 更新钱包选择按钮高亮
        function updateWalletBtns() {
            const mmBtns = [document.getElementById('walletMM'), document.getElementById('quickWalletMM')];
            const twBtns = [document.getElementById('walletTW'), document.getElementById('quickWalletTW')];
            mmBtns.forEach(btn => { if (btn) btn.className = 'wallet-select-btn' + (selectedWallet === 'metamask' ? ' active' : ''); });
            twBtns.forEach(btn => { if (btn) btn.className = 'wallet-select-btn' + (selectedWallet === 'trustwallet' ? ' active' : ''); });
        }

        // 获取指定钱包的 provider
        function getWalletProvider() {
            if (typeof window.ethereum === 'undefined') return null;

            // 如果有 providers 数组（多钱包共存），根据选择获取
            if (window.ethereum.providers && window.ethereum.providers.length > 1) {
                if (selectedWallet === 'metamask') {
                    const mm = window.ethereum.providers.find(p => p.isMetaMask);
                    if (mm) return mm;
                } else if (selectedWallet === 'trustwallet') {
                    const tw = window.ethereum.providers.find(p => p.isTrust || p.isTrustWallet);
                    if (tw) return tw;
                }
            }

            // 只有一个钱包，直接用 window.ethereum
            return window.ethereum;
        }

        // 初始化钱包检测
        detectWallets();

        // 从 URL 参数自动填充合约地址和网络
        (function() {
            const params = new URLSearchParams(window.location.search);
            const addr = params.get('contract');
            const net = params.get('network'); // 97=testnet, 56=mainnet
            if (addr) {
                document.getElementById('contractInput').value = addr;
                document.getElementById('contractDisplay').textContent = addr;
                // 有合约参数时，隐藏输入框，显示快捷连接按钮
                document.getElementById('setupPanel').style.display = 'none';
                document.getElementById('quickConnectPanel').style.display = 'block';
            }
            // 设置网络选择（URL 参数优先）
            const netValue = net || '97';
            document.getElementById('networkSelect').value = netValue;
            document.getElementById('quickNetworkSelect').value = netValue;
        })();

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
            el.style.display = 'block';
        }
        function hideStatus() {
            document.getElementById('status').style.display = 'none';
        }

        // 获取当前选择的网络
        function getSelectedNetwork() {
            const quickSel = document.getElementById('quickNetworkSelect');
            const setupSel = document.getElementById('networkSelect');
            // 哪个可见就用哪个
            if (quickSel && quickSel.closest('div').style.display !== 'none' && quickSel.offsetParent !== null) {
                return parseInt(quickSel.value);
            }
            return parseInt(setupSel.value);
        }

        // 网络选择变化时，同步两个选择器
        function onNetworkChange() {
            const val = getSelectedNetwork();
            document.getElementById('networkSelect').value = val;
            document.getElementById('quickNetworkSelect').value = val;
        }

        async function startConnect() {
            const ethereumProvider = getWalletProvider();
            if (!ethereumProvider) {
                showStatus('请安装 MetaMask 或 Trust Wallet', 'error');
                return;
            }

            const addr = document.getElementById('contractInput').value.trim();
            if (!addr || !addr.startsWith('0x') || addr.length !== 42) {
                showStatus('请输入有效的合约地址（42位，0x开头）', 'error');
                return;
            }

            const btn = document.getElementById('connectBtn') || document.getElementById('quickConnectBtn');
            btn.disabled = true;
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading"></span>连接中...';

            try {
                showStatus('正在连接钱包...', 'info');
                // 使用选定的钱包 provider
                activeEthereum = ethereumProvider;
                await activeEthereum.request({ method: 'eth_requestAccounts' });

                provider = new ethers.providers.Web3Provider(activeEthereum);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();

                // 检测当前网络
                const network = await provider.getNetwork();
                currentChainId = Number(network.chainId);

                // 获取用户选择的网络
                const selectedChainId = getSelectedNetwork();

                // 如果当前网络与选择不匹配，切换到用户选择的网络
                if (currentChainId !== selectedChainId) {
                    const targetName = BSC_NETWORKS[selectedChainId] ? BSC_NETWORKS[selectedChainId].name : 'BSC';
                    showStatus('正在切换到 ' + targetName + '...', 'warning');
                    const switched = await switchToBSC(selectedChainId);
                    if (!switched) {
                        showStatus('切换网络失败，请在钱包中手动切换到 ' + targetName + ' 后重试', 'error');
                        btn.disabled = false;
                        btn.textContent = originalText;
                        return;
                    }
                    // 切换后重新获取 provider
                    provider = new ethers.providers.Web3Provider(activeEthereum);
                    signer = provider.getSigner();
                    const newNetwork = await provider.getNetwork();
                    currentChainId = Number(newNetwork.chainId);
                }

                // 最终检查：是否在 BSC 网络上
                if (currentChainId !== 56 && currentChainId !== 97) {
                    showStatus('⚠️ 当前不在 BSC 网络，Mint 可能失败。请切换到 BSC 测试网或主网。', 'warning');
                }

                const contractAddr = ethers.utils.getAddress(addr); // 校验 checksum
                contract = new ethers.Contract(contractAddr, ABI, signer);

                document.getElementById('walletAddress').textContent =
                    userAddress.slice(0, 6) + '...' + userAddress.slice(-4);

                // 显示使用的钱包类型
                const walletLabel = activeEthereum.isMetaMask ? '🦊 MetaMask' : 
                    (activeEthereum.isTrust || activeEthereum.isTrustWallet) ? '🛡️ Trust Wallet' : '🔗 钱包';
                document.getElementById('walletType').textContent = walletLabel;

                // 更新网络标识
                updateNetworkBadge();

                // 切换面板
                document.getElementById('setupPanel').style.display = 'none';
                document.getElementById('quickConnectPanel').style.display = 'none';
                document.getElementById('mintInfo').style.display = 'block';

                await refreshInfo();
                hideStatus();
            } catch (err) {
                showStatus('连接失败: ' + (err.reason || err.message), 'error');
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        // 切换到指定 BSC 网络
        async function switchToBSC(chainId) {
            const eth = activeEthereum || window.ethereum;
            const chainHex = '0x' + chainId.toString(16);
            try {
                await eth.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: chainHex }]
                });
                return true;
            } catch (err) {
                // 如果网络不存在，添加 BSC
                if (err.code === 4902) {
                    try {
                        const net = BSC_NETWORKS[chainId];
                        await eth.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: chainHex,
                                chainName: net.chainName,
                                nativeCurrency: { name: net.symbol, symbol: net.symbol, decimals: 18 },
                                rpcUrls: [net.rpc],
                                blockExplorerUrls: [net.explorer]
                            }]
                        });
                        return true;
                    } catch (addErr) {
                        return false;
                    }
                }
                return false;
            }
        }

        // 更新网络标识
        function updateNetworkBadge() {
            const badge = document.getElementById('networkBadge');
            const net = BSC_NETWORKS[currentChainId];
            if (net) {
                badge.textContent = net.name;
                badge.className = 'network-badge ' + (currentChainId === 97 ? 'testnet' : 'mainnet');
            } else {
                badge.textContent = '⚠️ 非BSC网络';
                badge.className = 'network-badge wrong';
            }
            // 更新切换按钮
            updateSwitchBtn();
        }

        // 更新网络切换按钮
        function updateSwitchBtn() {
            const btn = document.getElementById('switchNetBtn');
            const nameSpan = document.getElementById('switchNetName');
            if (!btn || !nameSpan) return;
            const targetId = currentChainId === 97 ? 56 : 97;
            const targetNet = BSC_NETWORKS[targetId];
            if (targetNet && (currentChainId === 56 || currentChainId === 97)) {
                btn.style.display = 'block';
                nameSpan.textContent = targetNet.name;
            } else {
                btn.style.display = 'none';
            }
        }

        // 切换 BSC 主网/测试网
        async function switchNetwork() {
            const targetId = currentChainId === 97 ? 56 : 97;
            const targetNet = BSC_NETWORKS[targetId];
            const btn = document.getElementById('switchNetBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>切换中...';
            const switched = await switchToBSC(targetId);
            if (switched) {
                const eth = activeEthereum || window.ethereum;
                provider = new ethers.providers.Web3Provider(eth);
                signer = provider.getSigner();
                const newNetwork = await provider.getNetwork();
                currentChainId = Number(newNetwork.chainId);
                if (contract) {
                    contract = new ethers.Contract(contract.address, ABI, signer);
                }
                updateNetworkBadge();
                try {
                    await refreshInfo();
                    hideStatus();
                } catch (e) {
                    showStatus('网络已切换，但加载合约失败，请确认合约在此网络上已部署', 'warning');
                }
            } else {
                showStatus('切换网络失败，请在钱包中手动切换', 'error');
            }
            btn.disabled = false;
            updateSwitchBtn();
        }

        // 监听钱包网络切换
        (function() {
            const eth = window.ethereum;
            if (!eth) return;
            eth.on('chainChanged', async function(chainIdHex) {
                currentChainId = parseInt(chainIdHex, 16);
                updateNetworkBadge();
                // 网络切换后重新获取 provider 和刷新数据
                if (provider && contract) {
                    const activeEth = activeEthereum || window.ethereum;
                    provider = new ethers.providers.Web3Provider(activeEth);
                    signer = provider.getSigner();
                    contract = new ethers.Contract(contract.address, ABI, signer);
                    try {
                        await refreshInfo();
                    } catch (e) {
                        showStatus('网络已切换，请刷新页面', 'warning');
                    }
                }
            });
        })();

        async function refreshInfo() {
            try {
                const [mintActive, mintPrice, mintCount, mintedSlots, totalMintSlots, hasMinted, bnbBal, tokenName] =
                    await Promise.all([
                        contract.mintActive(),
                        contract.mintPrice(),
                        contract.mintCount(),
                        contract.mintedSlots(),
                        contract.totalMintSlots(),
                        contract.hasMinted(userAddress),
                        provider.getBalance(userAddress),
                        contract.name().catch(() => '')
                    ]);

                if (tokenName) {
                    document.querySelector('h1').textContent = '🚀 ' + tokenName;
                }

                document.getElementById('mintPrice').textContent =
                    parseFloat(ethers.utils.formatEther(mintPrice)).toFixed(4) + ' BNB';
                document.getElementById('mintCount').textContent =
                    parseFloat(ethers.utils.formatEther(mintCount)).toLocaleString();
                document.getElementById('mintedSlots').textContent =
                    mintedSlots.toString() + ' / ' + totalMintSlots.toString();
                document.getElementById('totalSlots').textContent = totalMintSlots.toString();
                document.getElementById('bnbBalance').textContent =
                    parseFloat(ethers.utils.formatEther(bnbBal)).toFixed(4);

                const pct = totalMintSlots > 0 ? (mintedSlots * 100 / totalMintSlots) : 0;
                document.getElementById('progressFill').style.width = pct.toFixed(1) + '%';
                document.getElementById('progressText').textContent = pct.toFixed(1);

                const mintBtn = document.getElementById('mintBtn');
                if (!mintActive) {
                    mintBtn.disabled = true;
                    mintBtn.textContent = '⛔ Mint 未开启';
                } else if (hasMinted) {
                    mintBtn.disabled = true;
                    mintBtn.textContent = '✅ 已 Mint';
                } else if (mintedSlots.gte(totalMintSlots)) {
                    mintBtn.disabled = true;
                    mintBtn.textContent = '🎉 Mint 已满';
                } else {
                    mintBtn.disabled = false;
                    mintBtn.textContent = '💎 Mint (' + ethers.utils.formatEther(mintPrice) + ' BNB)';
                }
            } catch (err) {
                showStatus('加载合约信息失败: ' + (err.reason || err.message), 'error');
            }
        }

        async function doMint() {
            try {
                // Mint 前检查网络
                const network = await provider.getNetwork();
                const chainId = Number(network.chainId);
                if (chainId !== 56 && chainId !== 97) {
                    showStatus('⚠️ 当前不在 BSC 网络，请切换后再试', 'error');
                    return;
                }

                const mintBtn = document.getElementById('mintBtn');
                mintBtn.disabled = true;
                mintBtn.innerHTML = '<span class="loading"></span>Mint 中...';
                showStatus('请在钱包中确认交易...', 'warning');

                const price = await contract.mintPrice();
                const tx = await contract.mint({ value: price });

                showStatus('交易已提交，等待链上确认...', 'warning');
                await tx.wait();

                showStatus('🎉 Mint 成功！代币已到账', 'success');
                await refreshInfo();
            } catch (err) {
                let msg = err.reason || err.message || '未知错误';
                // 更友好的错误提示
                if (msg.includes('insufficient funds')) {
                    msg = 'BNB 余额不足，请确保有足够的 BNB 支付 Mint 价格 + Gas 费';
                } else if (msg.includes('Not in whitelist')) {
                    msg = '不在白名单中，当前仅限白名单地址 Mint';
                } else if (msg.includes('Already minted')) {
                    msg = '您已经 Mint 过了，每个地址只能 Mint 一次';
                } else if (msg.includes('All slots minted')) {
                    msg = 'Mint 已满，所有份额已被 Mint';
                } else if (msg.includes('Mint is not active')) {
                    msg = 'Mint 未开启，请等待管理员开启';
                } else if (msg.includes('Incorrect BNB amount')) {
                    msg = '发送的 BNB 金额不正确';
                } else if (msg.includes('user rejected')) {
                    msg = '交易已取消';
                }
                showStatus('Mint 失败: ' + msg, 'error');
                const mintBtn = document.getElementById('mintBtn');
                mintBtn.disabled = false;
                mintBtn.textContent = '💎 重试 Mint';
            }
        }
    </script>
</body>
</html>
